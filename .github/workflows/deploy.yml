name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Serialise deploys so two rapid pushes don't race each other on the
# VPS. `cancel-in-progress: false` queues instead of canceling — a
# half-finished deploy is worse than waiting.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --check
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings
        env:
          SQLX_OFFLINE: "true"
      - name: Build
        run: cargo build --release --locked
        env:
          SQLX_OFFLINE: "true"
      - name: Tests
        run: cargo test --bin starship
        env:
          SQLX_OFFLINE: "true"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.VPS_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Notify deploy started
        env:
          WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK_URL }}
        run: |
          [ -z "$WEBHOOK" ] && exit 0
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          curl -fsSL -H "Content-Type: application/json" \
            -d "{\"content\": \":construction: Deploying \`${SHORT_SHA}\` to prod (bot will restart in ~30s)…\"}" \
            "$WEBHOOK"

      # The deploy key on the VPS is locked to `command="…/deploy.sh"`
      # in authorized_keys, so the empty ssh invocation runs deploy.sh
      # server-side regardless of what we send. No need to pass the
      # script path here.
      - name: Trigger deploy
        run: ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}

      - name: Notify deploy succeeded
        if: success()
        env:
          WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK_URL }}
        run: |
          [ -z "$WEBHOOK" ] && exit 0
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          curl -fsSL -H "Content-Type: application/json" \
            -d "{\"content\": \":white_check_mark: Deployed \`${SHORT_SHA}\` to prod — bot is back up\"}" \
            "$WEBHOOK"

      - name: Notify deploy failed
        if: failure()
        env:
          WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK_URL }}
        run: |
          [ -z "$WEBHOOK" ] && exit 0
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          curl -fsSL -H "Content-Type: application/json" \
            -d "{\"content\": \":x: Deploy of \`${SHORT_SHA}\` to prod FAILED — see <https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}>\"}" \
            "$WEBHOOK"
