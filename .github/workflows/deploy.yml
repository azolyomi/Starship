name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Serialise deploys so two rapid pushes don't race each other on the
# VPS. `cancel-in-progress: false` queues instead of canceling — a
# half-finished deploy is worse than waiting.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --check
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings
        env:
          SQLX_OFFLINE: "true"
      - name: Build
        run: cargo build --release --locked
        env:
          SQLX_OFFLINE: "true"
      - name: Tests
        run: cargo test --bin starship
        env:
          SQLX_OFFLINE: "true"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.VPS_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      # Build the commit context once, reuse from each notify step.
      # github.event.commits is populated on push events; empty for
      # workflow_dispatch — both cases produce a sensible message.
      # Caps the displayed list at 5 commits to stay well under
      # Discord's 2000-char limit, with a "...and N more" tail.
      #
      # Commits whose subject begins with `[internal]` are dropped:
      # those describe Claude / CI / dev-doc changes that aren't
      # user-facing. The convention is documented in CLAUDE.md under
      # the Commits section.
      - name: Build commit context
        id: ctx
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          RAW_COUNT=$(jq -r '.commits | length // 0' "$GITHUB_EVENT_PATH")

          if [ "$RAW_COUNT" -gt 0 ]; then
            FILTERED=$(jq '
              .commits
              | map(select((.message | split("\n")[0] | startswith("[internal]")) | not))
            ' "$GITHUB_EVENT_PATH")
            COMMIT_COUNT=$(echo "$FILTERED" | jq 'length')

            if [ "$COMMIT_COUNT" -gt 0 ]; then
              COMMITS_BLOCK=$(echo "$FILTERED" | jq -r '
                .[0:5]
                | map("> " + (.message | split("\n")[0]))
                | join("\n")
              ')
              if [ "$COMMIT_COUNT" -gt 5 ]; then
                COMMITS_BLOCK="${COMMITS_BLOCK}"$'\n'"> …and $((COMMIT_COUNT - 5)) more"
              fi
              COUNT_SUFFIX=""
              if [ "$COMMIT_COUNT" -gt 1 ]; then
                COUNT_SUFFIX=" (${COMMIT_COUNT} commits)"
              fi
            else
              # Push contained only [internal] commits — bot still
              # restarts, so post a stub instead of skipping.
              COMMITS_BLOCK=""
              COUNT_SUFFIX=" (internal changes only)"
            fi
          else
            COMMITS_BLOCK=""
            COUNT_SUFFIX=" (manual)"
          fi

          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "count_suffix=${COUNT_SUFFIX}" >> "$GITHUB_OUTPUT"
          {
            echo "commits_block<<COMMITS_EOF"
            echo "$COMMITS_BLOCK"
            echo "COMMITS_EOF"
          } >> "$GITHUB_OUTPUT"

      # Webhook posts return a Message object when ?wait=true is
      # appended; we capture (channel_id, message_id) and follow up
      # with a Crosspost call so the message gets published to any
      # server that follows this announcement channel. The bot token
      # is the auth — webhook tokens themselves can't crosspost.
      # Both DISCORD_DEPLOY_WEBHOOK_URL and DISCORD_BOT_TOKEN are
      # optional: missing webhook = skip the notification entirely;
      # missing bot token = post but don't crosspost.

      - name: Notify deploy started
        env:
          WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK_URL }}
          BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          HEADER: ":construction: Deploying `${{ steps.ctx.outputs.short_sha }}`${{ steps.ctx.outputs.count_suffix }} to prod (bot will restart in ~30s)…"
          COMMITS: ${{ steps.ctx.outputs.commits_block }}
        run: |
          [ -z "$WEBHOOK" ] && exit 0
          if [ -n "$COMMITS" ]; then
            CONTENT=$(printf '%s\n%s' "$HEADER" "$COMMITS")
          else
            CONTENT="$HEADER"
          fi
          PAYLOAD=$(jq -n --arg c "$CONTENT" '{content: $c}')
          BODY=$(curl -fsSL -H "Content-Type: application/json" \
            -d "$PAYLOAD" "${WEBHOOK}?wait=true")
          if [ -n "$BOT_TOKEN" ]; then
            MID=$(echo "$BODY" | jq -r .id)
            CID=$(echo "$BODY" | jq -r .channel_id)
            curl -fsSL -X POST \
              -H "Authorization: Bot ${BOT_TOKEN}" \
              -H "Content-Length: 0" \
              "https://discord.com/api/v10/channels/${CID}/messages/${MID}/crosspost"
          fi

      # The deploy key on the VPS is locked to `command="…/deploy.sh"`
      # in authorized_keys, so the empty ssh invocation runs deploy.sh
      # server-side regardless of what we send. No need to pass the
      # script path here.
      - name: Trigger deploy
        run: ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}

      - name: Notify deploy succeeded
        if: success()
        env:
          WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK_URL }}
          BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          HEADER: ":white_check_mark: Deployed `${{ steps.ctx.outputs.short_sha }}`${{ steps.ctx.outputs.count_suffix }} to prod — bot is back up"
          COMMITS: ${{ steps.ctx.outputs.commits_block }}
        run: |
          [ -z "$WEBHOOK" ] && exit 0
          if [ -n "$COMMITS" ]; then
            CONTENT=$(printf '%s\n%s' "$HEADER" "$COMMITS")
          else
            CONTENT="$HEADER"
          fi
          PAYLOAD=$(jq -n --arg c "$CONTENT" '{content: $c}')
          BODY=$(curl -fsSL -H "Content-Type: application/json" \
            -d "$PAYLOAD" "${WEBHOOK}?wait=true")
          if [ -n "$BOT_TOKEN" ]; then
            MID=$(echo "$BODY" | jq -r .id)
            CID=$(echo "$BODY" | jq -r .channel_id)
            curl -fsSL -X POST \
              -H "Authorization: Bot ${BOT_TOKEN}" \
              -H "Content-Length: 0" \
              "https://discord.com/api/v10/channels/${CID}/messages/${MID}/crosspost"
          fi

      - name: Notify deploy failed
        if: failure()
        env:
          WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK_URL }}
          BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          HEADER: ":x: Deploy of `${{ steps.ctx.outputs.short_sha }}`${{ steps.ctx.outputs.count_suffix }} to prod FAILED — see <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}>"
          COMMITS: ${{ steps.ctx.outputs.commits_block }}
        run: |
          [ -z "$WEBHOOK" ] && exit 0
          if [ -n "$COMMITS" ]; then
            CONTENT=$(printf '%s\n%s' "$HEADER" "$COMMITS")
          else
            CONTENT="$HEADER"
          fi
          PAYLOAD=$(jq -n --arg c "$CONTENT" '{content: $c}')
          BODY=$(curl -fsSL -H "Content-Type: application/json" \
            -d "$PAYLOAD" "${WEBHOOK}?wait=true")
          if [ -n "$BOT_TOKEN" ]; then
            MID=$(echo "$BODY" | jq -r .id)
            CID=$(echo "$BODY" | jq -r .channel_id)
            curl -fsSL -X POST \
              -H "Authorization: Bot ${BOT_TOKEN}" \
              -H "Content-Length: 0" \
              "https://discord.com/api/v10/channels/${CID}/messages/${MID}/crosspost"
          fi
